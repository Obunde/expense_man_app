<!DOCTYPE html>
<html>
<head>
  <title>Page Not Found (404) | Spendless</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      background-color: #f8fbf7;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(60, 91, 56, 0.1);
      border-top: 5px solid #3c5b38; /* Milan Green */
    }
    h1 { font-size: 5rem; color: #bedb39; margin: 0; } /* Caper Green */
    h2 { color: #3c5b38; margin-bottom: 1rem; }
    p { color: #666; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      background-color: #3c5b38;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      display: inline-block;
    }
    .btn:hover { background-color: #2d442a; }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>
    <h2>The page you're looking for was not found.</h2>
    <p>It might have been deleted, or the URL might be mistyped.</p>
  </div>
</body>
</html>
