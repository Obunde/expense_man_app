<!DOCTYPE html>
<html>
<head>
  <title>Something Went Wrong (500) | Spendless</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {
      background-color: #f8fbf7;
      color: #333;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(60, 91, 56, 0.1);
      border-top: 5px solid #d9534f; /* Alert Red for 500 errors */
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h2 { color: #3c5b38; margin-bottom: 1rem; }
    p { color: #666; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      background-color: #3c5b38;
      color: white;
      padding: 12px 24px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      display: inline-block;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon">📉</div>
    <h2>Technical Glitch</h2>
    <p>We're sorry, but something went wrong on our end. We've been notified and are looking into it.</p>
    <a href="/" class="btn">Try Refreshing</a>
  </div>
</body>
</html>
